<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wholesale CRM Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 1em;
      text-align: center;
    }
    nav {
      margin-top: 1em;
    }
    nav button {
      margin: 0 5px;
      padding: 10px 15px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    main {
      padding: 1em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1em;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
      text-align: left;
    }
    #mapContainer {
      height: 500px;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <header>
    <h1>Wholesale Real Estate CRM</h1>
    <nav>
      <button onclick="showSection('dashboard')">Dashboard</button>
      <button onclick="showSection('map')">Map View</button>
      <button onclick="showSection('login')">Login</button>
    </nav>
  </header>
  <main>
    <section id="dashboard">
      <h2>Leads</h2>
      <table id="leadsTable">
        <thead>
          <tr>
            <th>Address</th>
            <th>ARV</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>123 Main St, Detroit, MI</td>
            <td>$150,000</td>
            <td><button onclick="alert('Lead opened')">View</button></td>
          </tr>
        </tbody>
      </table>
    </section>
    <section id="map" style="display:none">
      <div id="mapContainer"></div>
    </section>
    <section id="login" style="display:none">
      <form onsubmit="login(event)">
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </section>
  </main>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    function showSection(id) {
      document.querySelectorAll('main > section').forEach(section => {
        section.style.display = section.id === id ? 'block' : 'none';
      });
    }

    function login(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      alert('Logged in as ' + email);
    }

    document.addEventListener('DOMContentLoaded', function () {
      const map = L.map('mapContainer').setView([42.3314, -83.0458], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      L.marker([42.3314, -83.0458]).addTo(map)
        .bindPopup('123 Main St, Detroit, MI')
        .openPopup();
    });
  </script>
</body>
</html>
